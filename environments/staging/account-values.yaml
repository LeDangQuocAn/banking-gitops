image:
  repository: 141571819416.dkr.ecr.ap-southeast-1.amazonaws.com/banking-microservices-staging-account-service
  tag: "381820afbdd92f52f2aef56c10342685f0cf19db"

replicaCount: 1

container:
  port: 8084
dependencies:
  postgres:
    enabled: true
    host: ""
    port: 5432
    database: ""
    databaseSecretRef:
      name: "staging-rds-credentials"
      key: "dbname"
    username: "bankingadmin"
    hostSecretRef:
      name: "staging-rds-credentials"
      key: "host"
    passwordSecret:
      name: "staging-rds-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "staging-infrastructure-rabbitmq.banking-infra.svc.cluster.local"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-staging-rabbitmq"
      key: "rabbitmq-password"
  redis:
    enabled: true
    host: ""
    port: 6379
    database: 1
    hostSecretRef:
      name: "staging-elasticache-credentials"
      key: "host"
    passwordSecret:
      name: "staging-elasticache-credentials"
      key: "auth_token"
  env:
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot.banking.svc.cluster.local:8761/eureka
    - name: EUREKA_HOST
      value: "discovery-client-staging-banking-spring-boot.banking.svc.cluster.local"
    - name: EUREKA_PORT
      value: "8761"

service:
  port: 8084
  targetPort: http

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: account.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
