image:
  repository: 141571819416.dkr.ecr.ap-southeast-1.amazonaws.com/banking-microservices-staging-account-service
  tag: "c0836d4b4681c729087de727259044f466d59192"

replicaCount: 1

container:
  port: 8084
dependencies:
  postgres:
    enabled: true
    host: ""
    port: 5432
    database: "banking"
    username: "banking"
    hostSecretRef:
      name: "staging-rds-credentials"
      key: "host"
    passwordSecret:
      name: "staging-rds-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "infra-staging-rabbitmq"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-staging-rabbitmq"
      key: "rabbitmq-password"
  redis:
    enabled: true
    host: ""
    port: 6379
    database: 1
    hostSecretRef:
      name: "staging-elasticache-credentials"
      key: "host"
    passwordSecret:
      name: "staging-elasticache-credentials"
      key: "auth_token"
  env:
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot:8761/eureka

service:
  port: 8084
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: account.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
