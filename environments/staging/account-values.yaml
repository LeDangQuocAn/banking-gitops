image:
  repository: banking-microservices-account-service
  tag: "latest"

replicaCount: 1

container:
  port: 8084
  env:
    - name: POSTGRES_HOST
      value: infra-staging-postgresql
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_USER
      value: postgres
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: infra-staging-postgresql
          key: postgres-password
    - name: RABBITMQ_HOST
      value: infra-staging-rabbitmq
    - name: RABBITMQ_PORT
      value: "5672"
    - name: RABBITMQ_USER
      value: user
    - name: RABBITMQ_PASSWORD
      valueFrom:
        secretKeyRef:
          name: infra-staging-rabbitmq
          key: rabbitmq-password
    - name: REDIS_DB
      value: "1"
    - name: REDIS_HOST
      value: infra-staging-redis-master
    - name: REDIS_PORT
      value: "6379"
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot:8761/eureka

service:
  port: 8084
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: account.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
