image:
  repository: banking-microservices-staging-account-service
  tag: "86a1979aaa676757e129f4f4b574a4b6f828f2a6"

replicaCount: 1

container:
  port: 8084
dependencies:
  postgres:
    enabled: true
    host: "TF_STAGING_RDS_HOST"
    port: 5432
    database: "banking"
    username: "banking"
    passwordSecret:
      name: "staging-rds-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "infra-staging-rabbitmq"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-staging-rabbitmq"
      key: "rabbitmq-password"
  redis:
    enabled: true
    host: "TF_STAGING_ELASTICACHE_HOST"
    port: 6379
    database: 1
    passwordSecret:
      name: "staging-elasticache-credentials"
      key: "auth_token"
  env:
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot:8761/eureka

service:
  port: 8084
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: account.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
