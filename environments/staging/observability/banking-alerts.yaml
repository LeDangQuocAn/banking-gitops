apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: banking-microservices-alerts
  namespace: monitoring
  labels:
    release: staging-observability-prometheus
spec:
  groups:
    - name: banking.rules
      rules:
        - alert: BankingServiceDown
          expr: up{namespace="banking"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Service {{ $labels.service }} is down
            description: The service {{ $labels.service }} in namespace {{ $labels.namespace }} has been down for more than 1 minute.