image:
  repository: 141571819416.dkr.ecr.ap-southeast-1.amazonaws.com/banking-microservices-staging-log-service
  tag: "0fd80aa0a6549a11015fb3fd05ff7c790f2d2fd9"

replicaCount: 1

container:
  port: 8086

initContainers:
  - name: mongodb-ca-bundle
    image: curlimages/curl:8.7.1
    command:
      - sh
      - -c
      - |
        set -euo pipefail
        curl -fsSL --retry 5 --retry-delay 2 https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o /bundle/global-bundle.pem
    volumeMounts:
      - name: mongodb-ca-bundle
        mountPath: /bundle

extraEnv:
  - name: MONGODB_HOST
    valueFrom:
      secretKeyRef:
        name: staging-docdb-credentials
        key: host
  - name: MONGODB_PORT
    value: "27017"
  - name: MONGODB_DB
    valueFrom:
      secretKeyRef:
        name: staging-docdb-credentials
        key: dbname
  - name: MONGODB_USER
    value: docdbadmin
  - name: MONGODB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: staging-docdb-credentials
        key: password
  - name: SPRING_DATA_MONGODB_SSL_ENABLED
    value: "true"
  - name: SPRING_DATA_MONGODB_SSL_BUNDLE
    value: docdb
  - name: SPRING_SSL_BUNDLE_PEM_DOCDB_TRUSTSTORE_CERTIFICATE
    value: file:/etc/docdb-ca/global-bundle.pem

volumeMounts:
  - name: mongodb-ca-bundle
    mountPath: /etc/docdb-ca
    readOnly: true

volumes:
  - name: mongodb-ca-bundle
    emptyDir: {}

service:
  port: 8086
  targetPort: http

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: log.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  startup:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 24
