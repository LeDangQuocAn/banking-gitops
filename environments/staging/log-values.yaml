image:
  repository: banking-microservices-staging-log-service
  tag: "3f661fd295bdf8be46f84d26b9c16ee8fe87e1e4"

replicaCount: 1

container:
  port: 8086
dependencies:
  mongodb:
    enabled: true
    host: "TF_STAGING_DOCDB_HOST"
    port: 27017
    database: "banking-microservices"
    username: "log_admin"
    passwordSecret:
      name: "staging-docdb-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "infra-staging-rabbitmq"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-staging-rabbitmq"
      key: "rabbitmq-password"
  env:
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot:8761/eureka

service:
  port: 8086
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: log.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 90
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 10
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 45
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 12
  startup:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
