image:
  repository: banking-microservices-log-service
  tag: "latest"

replicaCount: 1

container:
  port: 8086
  env:
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot:8761/eureka
    - name: MONGODB_HOST
      value: infra-staging-mongodb
    - name: MONGODB_PORT
      value: "27017"
    - name: MONGODB_DB
      value: banking-microservices
    - name: MONGODB_USER
      value: root
    - name: MONGODB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: infra-staging-mongodb
          key: mongodb-root-password
    - name: RABBITMQ_HOST
      value: infra-staging-rabbitmq
    - name: RABBITMQ_PORT
      value: "5672"
    - name: RABBITMQ_USER
      value: user
    - name: RABBITMQ_PASSWORD
      valueFrom:
        secretKeyRef:
          name: infra-staging-rabbitmq
          key: rabbitmq-password

service:
  port: 8086
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: log.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 90
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 10
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 45
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 12
  startup:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
