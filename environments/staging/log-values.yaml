image:
  repository: 141571819416.dkr.ecr.ap-southeast-1.amazonaws.com/banking-microservices-staging-log-service
  tag: "26da0ae5e1ddd26b0a5325f1de45ecae25f0e13b"

replicaCount: 1

container:
  port: 8086
dependencies:
  mongodb:
    enabled: true
    host: ""
    port: 27017
    database: ""
    databaseSecretRef:
      name: "staging-docdb-credentials"
      key: "dbname"
    username: "docdbadmin"
    hostSecretRef:
      name: "staging-docdb-credentials"
      key: "host"
    passwordSecret:
      name: "staging-docdb-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "infra-staging-rabbitmq"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-staging-rabbitmq"
      key: "rabbitmq-password"
  env:
    - name: EUREKA_SERVER_URL
      value: http://172.20.105.215:8761/eureka
    - name: EUREKA_HOST
      value: "172.20.105.215"
    - name: EUREKA_PORT
      value: "8761"

service:
  port: 8086
  targetPort: http

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: log.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  startup:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 24
