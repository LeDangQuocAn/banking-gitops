env:
  - name: POSTGRES_HOST
    valueFrom:
      secretKeyRef:
        name: staging-rds-credentials
        key: host
  - name: POSTGRES_PORT
    value: "5432"
  - name: POSTGRES_DB
    valueFrom:
      secretKeyRef:
        name: staging-rds-credentials
        key: dbname
  - name: POSTGRES_USER
    value: bankingadmin
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: staging-rds-credentials
        key: password
  - name: RABBITMQ_HOST
    value: staging-infrastructure-rabbitmq.banking-infra.svc.cluster.local
  - name: RABBITMQ_PORT
    value: "5672"
  - name: RABBITMQ_USER
    value: user
  - name: RABBITMQ_PASSWORD
    valueFrom:
      secretKeyRef:
        name: infra-staging-rabbitmq
        key: rabbitmq-password
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: staging-elasticache-credentials
        key: host
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_DB
    value: "1"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: staging-elasticache-credentials
        key: auth_token
  - name: SPRING_DATA_REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: staging-elasticache-credentials
        key: auth_token
  - name: SPRING_DATA_REDIS_SSL_ENABLED
    value: "true"
  - name: EUREKA_SERVER_URL
    value: http://discovery-client-staging-banking-spring-boot.banking.svc.cluster.local:8761/eureka
  - name: EUREKA_HOST
    value: discovery-client-staging-banking-spring-boot.banking.svc.cluster.local
  - name: EUREKA_PORT
    value: "8761"
