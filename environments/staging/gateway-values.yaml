image:
  repository: 141571819416.dkr.ecr.ap-southeast-1.amazonaws.com/banking-microservices-staging-api-gateway-service
  tag: "01224a9425bee36b25a52803ea259f70758d2cec"

replicaCount: 1

container:
  port: 8087

dependencies:
  env:
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot.banking.svc.cluster.local:8761/eureka
    - name: EUREKA_HOST
      value: "discovery-client-staging-banking-spring-boot.banking.svc.cluster.local"
    - name: EUREKA_PORT
      value: "8761"

service:
  port: 8087
  targetPort: http

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  hosts:
    - host: gateway.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
