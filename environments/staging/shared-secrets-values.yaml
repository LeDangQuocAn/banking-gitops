# Shared ExternalSecrets for Banking Platform - Staging Environment
namespace: banking

externalSecrets:
  # Secret store reference - points to the Vault backend
  secretStore:
    name: vault-backend
    kind: ClusterSecretStore
  
  # Refresh interval for syncing secrets from Vault
  refreshInterval: 1h
  
  # RDS Credentials
  rdsCredentials:
    enabled: true
    name: staging-rds-external-secret
    targetName: staging-rds-credentials
    vaultPath: banking/rds
  
  # ElastiCache (Redis) Credentials
  elasticacheCredentials:
    enabled: true
    name: staging-elasticache-external-secret
    targetName: staging-elasticache-credentials
    vaultPath: banking/redis
  
  # RabbitMQ Credentials
  rabbitmqCredentials:
    enabled: true
    name: staging-rabbitmq-external-secret
    targetName: infra-staging-rabbitmq
    vaultPath: banking/rabbitmq
