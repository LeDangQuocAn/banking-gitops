alertmanager:
  enabled: true
  
  # 1. Cấu hình Slack Webhook
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/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'
    route:
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack-notifications'
      routes:
        - receiver: 'slack-notifications'
          matchers:
            - severity="critical"
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#devops-alerts' # Đảm bảo channel này đã được tạo trên Slack
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Severity:* `{{ .Labels.severity }}`
                *Started:* {{ .StartsAt }}
              {{ end }}

  # 2. Cấu hình Storage (Giữ nguyên của bạn)
  alertmanagerSpec:
    # Use ephemeral storage for staging (emptyDir)
    storage:
      emptyDir: {}

prometheus:
  prometheusSpec:
    # Use ephemeral storage for staging (emptyDir)
    storageSpec:
      emptyDir: {}

grafana:
  persistence:
    enabled: false

  # 1. ALLOW the chart to build its native default Prometheus
  defaultDatasourceEnabled: true

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: true
      # 2. FORCE the native Prometheus to use the UID our dashboards expect
      uid: "prometheus"
      alertmanager:
        enabled: false

  additionalDataSources:
    # 3. ONLY keep Loki here. DO NOT add Prometheus.
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-stack.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false