prometheus:
  prometheusSpec:
    # Use ephemeral storage for staging (emptyDir)
    storageSpec:
      emptyDir: {}

alertmanager:
  alertmanagerSpec:
    # Use ephemeral storage for staging (emptyDir)
    storage:
      emptyDir: {}

grafana:
  persistence:
    enabled: false
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
  # Provision Prometheus and Loki as datasources automatically
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-stack.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
