prometheus:
  prometheusSpec:
    # Use ephemeral storage for staging (emptyDir)
    storageSpec:
      emptyDir: {}

alertmanager:
  alertmanagerSpec:
    # Use ephemeral storage for staging (emptyDir)
    storage:
      emptyDir: {}

grafana:
  persistence:
    enabled: false

  # 1. ALLOW the chart to build its native default Prometheus
  defaultDatasourceEnabled: true

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: true
      # 2. FORCE the native Prometheus to use the UID our dashboards expect
      uid: "prometheus"
      alertmanager:
        enabled: false

  additionalDataSources:
    # 3. ONLY keep Loki here. DO NOT add Prometheus.
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-stack.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
