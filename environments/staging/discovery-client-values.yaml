image:
  repository: 141571819416.dkr.ecr.ap-southeast-1.amazonaws.com/banking-microservices-staging-discovery-client-service
  tag: "81f63d6a6b69d73f908972d486b736baa7a2807d"

replicaCount: 1

container:
  port: 8761

service:
  port: 8761
  targetPort: http

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: discovery.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  startup:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 24
