image:
  repository: banking-microservices-staging-credit-card-service
  tag: "5369a4746f227822803976995d65372458881a32"

replicaCount: 1

container:
  port: 8083
dependencies:
  postgres:
    enabled: true
    host: "TF_STAGING_RDS_HOST"
    port: 5432
    database: "banking"
    username: "banking"
    passwordSecret:
      name: "staging-rds-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "infra-staging-rabbitmq"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-staging-rabbitmq"
      key: "rabbitmq-password"
  redis:
    enabled: true
    host: "TF_STAGING_ELASTICACHE_HOST"
    port: 6379
    database: 1
    passwordSecret:
      name: "staging-elasticache-credentials"
      key: "auth_token"
  env:
    - name: EUREKA_SERVER_URL
      value: http://discovery-client-staging-banking-spring-boot:8761/eureka
    - name: USER_SERVICE_HOST
      value: user-staging-banking-spring-boot
    - name: BANK_SERVICE_HOST
      value: bank-staging-banking-spring-boot

service:
  port: 8083
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: creditcard.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 90
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 10
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 45
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 12
  startup:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
