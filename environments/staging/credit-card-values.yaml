image:
  repository: ghcr.io/your-org/credit-card-service
  tag: "staging-latest"

replicaCount: 1

container:
  port: 8085

service:
  port: 8085
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: creditcard.staging.banking.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
