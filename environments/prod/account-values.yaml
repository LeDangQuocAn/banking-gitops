image:
  repository: ghcr.io/your-org/account-service
  tag: "1.0.0"

replicaCount: 2

container:
  port: 8084

service:
  port: 8084
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: account.banking.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
