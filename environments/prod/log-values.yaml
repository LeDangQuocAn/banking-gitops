image:
  repository: ghcr.io/your-org/log-service
  tag: "1.0.0"

replicaCount: 2

container:
  port: 8089

dependencies:
  mongodb:
    enabled: true
    host: "TF_PROD_DOCDB_HOST"
    port: 27017
    database: "banking-microservices"
    username: "log_admin"
    passwordSecret:
      name: "prod-docdb-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "infra-prod-rabbitmq"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-prod-rabbitmq"
      key: "rabbitmq-password"

service:
  port: 8089
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: log.banking.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
