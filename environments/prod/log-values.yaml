image:
  repository: 141571819416.dkr.ecr.ap-southeast-1.amazonaws.com/banking-microservices-prod-log-service
  tag: "a2075de114c47fd5d715876fab6a65898604ef9d"

replicaCount: 2

container:
  port: 8089

initContainers:
  - name: mongodb-ca-bundle
    image: curlimages/curl:8.7.1
    command:
      - sh
      - -c
      - |
        set -euo pipefail
        curl -fsSL --retry 5 --retry-delay 2 https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o /bundle/global-bundle.pem
    volumeMounts:
      - name: mongodb-ca-bundle
        mountPath: /bundle

extraEnv:
  - name: SPRING_DATA_MONGODB_SSL_BUNDLE
    value: docdb
  - name: SPRING_SSL_BUNDLE_PEM_DOCDB_TRUSTSTORE_CERTIFICATE
    value: file:/etc/docdb-ca/global-bundle.pem

volumeMounts:
  - name: mongodb-ca-bundle
    mountPath: /etc/docdb-ca
    readOnly: true

volumes:
  - name: mongodb-ca-bundle
    emptyDir: {}

service:
  port: 8089
  targetPort: http

ingress:
  enabled: false
  className: "alb"
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
