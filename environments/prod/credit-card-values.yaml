image:
  repository: ghcr.io/your-org/credit-card-service
  tag: "1.0.0"

replicaCount: 2

container:
  port: 8085

dependencies:
  postgres:
    enabled: true
    host: "TF_PROD_RDS_HOST"
    port: 5432
    database: "banking"
    username: "banking"
    passwordSecret:
      name: "prod-rds-credentials"
      key: "password"
  rabbitmq:
    enabled: true
    host: "infra-prod-rabbitmq"
    port: 5672
    username: "user"
    passwordSecret:
      name: "infra-prod-rabbitmq"
      key: "rabbitmq-password"
  redis:
    enabled: true
    host: "TF_PROD_ELASTICACHE_HOST"
    port: 6379
    database: 1
    passwordSecret:
      name: "prod-elasticache-credentials"
      key: "auth_token"

service:
  port: 8085
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: creditcard.banking.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
