namespace: banking

clusterSecretStore:
  enabled: false
  name: vault-backend
  vault:
    server: http://vault.vault.svc.cluster.local:8200
    path: banking
    version: v2
    auth:
      mountPath: kubernetes
      role: external-secrets
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets

externalSecrets:
  secretStore:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: 1h
  rdsCredentials:
    enabled: false
    name: staging-rds-external-secret
    targetName: staging-rds-credentials
    vaultPath: banking/rds
  elasticacheCredentials:
    enabled: false
    name: staging-elasticache-external-secret
    targetName: staging-elasticache-credentials
    authToken: ""
    vaultPath: banking/redis
  rabbitmqCredentials:
    enabled: false
    name: staging-rabbitmq-external-secret
    targetName: infra-staging-rabbitmq
    vaultPath: banking/rabbitmq
