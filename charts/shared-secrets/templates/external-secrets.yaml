{{- if .Values.externalSecrets.rdsCredentials.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.rdsCredentials.name }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ .Values.externalSecrets.rdsCredentials.targetName }}
    template:
      engineVersion: v2
      data:
        username: "{{ `{{ .username }}` }}"
        password: "{{ `{{ .password }}` }}"
        host: "{{ `{{ .host }}` }}"
        port: "{{ `{{ .port }}` }}"
        dbname: "{{ `{{ .dbname }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.rdsCredentials.vaultPath }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.rdsCredentials.vaultPath }}
        property: password
    - secretKey: host
      remoteRef:
        key: {{ .Values.externalSecrets.rdsCredentials.vaultPath }}
        property: host
    - secretKey: port
      remoteRef:
        key: {{ .Values.externalSecrets.rdsCredentials.vaultPath }}
        property: port
    - secretKey: dbname
      remoteRef:
        key: {{ .Values.externalSecrets.rdsCredentials.vaultPath }}
        property: dbname
---
{{- end }}
