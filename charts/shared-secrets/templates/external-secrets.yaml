{{- if .Values.externalSecrets.rabbitmqCredentials.enabled }}
{{- $rabbitmqNamespaces := .Values.externalSecrets.rabbitmqCredentials.targetNamespaces | default (list .Values.namespace) -}}
{{- range $namespace := $rabbitmqNamespaces }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $.Values.externalSecrets.rabbitmqCredentials.name }}
  namespace: {{ $namespace }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStore.name }}
    kind: {{ $.Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ $.Values.externalSecrets.rabbitmqCredentials.targetName }}
  data:
    - secretKey: rabbitmq-password
      remoteRef:
        key: {{ $.Values.externalSecrets.rabbitmqCredentials.vaultPath }}
        property: rabbitmq-password
{{- end }}
---
{{- end }}
