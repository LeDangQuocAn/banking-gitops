replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/your-org/your-service
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

container:
  portName: http
  port: 8080
  env: []
  envFrom: []

service:
  type: ClusterIP
  port: 80
  targetPort: http
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  existingSecret: ""
  stringData: {}

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 6
  startup:
    enabled: false
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 20
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 30

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
