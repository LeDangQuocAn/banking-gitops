replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/your-org/your-service
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

container:
  portName: http
  port: 8080
  env: []
  envFrom: []

dependencies:
  postgres:
    enabled: false
    host: ""
    port: 5432
    database: ""
    databaseSecretRef:
      name: ""
      key: "dbname"
    username: ""
    hostSecretRef:
      name: ""
      key: "host"
    passwordSecret:
      name: ""
      key: ""
  rabbitmq:
    enabled: false
    host: ""
    port: 5672
    username: ""
    passwordSecret:
      name: ""
      key: ""
  redis:
    enabled: false
    host: ""
    port: 6379
    database: 0
    hostSecretRef:
      name: ""
      key: "host"
    passwordSecret:
      name: ""
      key: ""
  mongodb:
    enabled: false
    host: ""
    port: 27017
    database: ""
    databaseSecretRef:
      name: ""
      key: "dbname"
    username: ""
    hostSecretRef:
      name: ""
      key: "host"
    passwordSecret:
      name: ""
      key: ""

service:
  type: ClusterIP
  port: 80
  targetPort: http
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  existingSecret: ""
  stringData: {}

externalSecret:
  enabled: false
  secretStoreRef:
    name: "vault-backend"
    kind: "ClusterSecretStore"
  data: []
    # - secretKey: "password"
    #   remoteRef:
    #     key: "secret/data/my-service"
    #     property: "password"

probes:
  liveness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/liveness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  readiness:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health/readiness
        port: http
      initialDelaySeconds: 180
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  startup:
    enabled: true
    spec:
      httpGet:
        path: /actuator/health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 24

resources: {}

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
