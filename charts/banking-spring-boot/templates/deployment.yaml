{{- include "banking-spring-boot.validateDependencyConfig" . -}}
{{- $d := .Values.dependencies -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "banking-spring-boot.fullname" . }}
  labels:
    {{- include "banking-spring-boot.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "banking-spring-boot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "banking-spring-boot.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "banking-spring-boot.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "banking-spring-boot.name" . }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.container.portName }}
              containerPort: {{ .Values.container.port }}
              protocol: TCP
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness.spec | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness.spec | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            {{- toYaml .Values.probes.startup.spec | nindent 12 }}
          {{- end }}
          {{- if or $d.postgres.enabled $d.rabbitmq.enabled $d.redis.enabled $d.mongodb.enabled .Values.container.env }}
          env:
            {{- if $d.postgres.enabled }}
            - name: POSTGRES_HOST
              value: {{ $d.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ toString $d.postgres.port | quote }}
            - name: POSTGRES_DB
              value: {{ $d.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ $d.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $d.postgres.passwordSecret.name | quote }}
                  key: {{ $d.postgres.passwordSecret.key | quote }}
            {{- end }}
            {{- if $d.rabbitmq.enabled }}
            - name: RABBITMQ_HOST
              value: {{ $d.rabbitmq.host | quote }}
            - name: RABBITMQ_PORT
              value: {{ toString $d.rabbitmq.port | quote }}
            - name: RABBITMQ_USER
              value: {{ $d.rabbitmq.username | quote }}
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $d.rabbitmq.passwordSecret.name | quote }}
                  key: {{ $d.rabbitmq.passwordSecret.key | quote }}
            {{- end }}
            {{- if $d.redis.enabled }}
            - name: REDIS_HOST
              value: {{ $d.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ toString $d.redis.port | quote }}
            - name: REDIS_DB
              value: {{ toString $d.redis.database | quote }}
            {{- if $d.redis.passwordSecret.name }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $d.redis.passwordSecret.name | quote }}
                  key: {{ $d.redis.passwordSecret.key | quote }}
            {{- end }}
            {{- end }}
            {{- if $d.mongodb.enabled }}
            - name: MONGODB_HOST
              value: {{ $d.mongodb.host | quote }}
            - name: MONGODB_PORT
              value: {{ toString $d.mongodb.port | quote }}
            - name: MONGODB_DB
              value: {{ $d.mongodb.database | quote }}
            - name: MONGODB_USER
              value: {{ $d.mongodb.username | quote }}
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $d.mongodb.passwordSecret.name | quote }}
                  key: {{ $d.mongodb.passwordSecret.key | quote }}
            {{- end }}
            {{- with .Values.container.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if or .Values.configMap.enabled .Values.secret.enabled .Values.secret.existingSecret .Values.container.envFrom }}
          envFrom:
            {{- if .Values.configMap.enabled }}
            - configMapRef:
                name: {{ include "banking-spring-boot.fullname" . }}
            {{- end }}
            {{- if .Values.secret.enabled }}
            - secretRef:
                name: {{ include "banking-spring-boot.fullname" . }}
            {{- else if .Values.secret.existingSecret }}
            - secretRef:
                name: {{ .Values.secret.existingSecret }}
            {{- end }}
            {{- with .Values.container.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
