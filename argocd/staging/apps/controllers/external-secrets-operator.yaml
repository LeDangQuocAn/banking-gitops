apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-staging-controllers-external-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: banking-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    platform.banking.io/environment: staging
    platform.banking.io/layer: controllers
spec:
  project: banking-staging
  
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.9
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        replicaCount: 1
        serviceAccount:
          create: false
          name: external-secrets
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::141571819416:role/banking-microservices-staging-external-secrets-role
        securityContext:
          runAsNonRoot: true
  
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

