apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-prod-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: banking-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    platform.banking.io/environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/LeDangQuocAn/banking-gitops
    targetRevision: production
    path: argocd/prod/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
