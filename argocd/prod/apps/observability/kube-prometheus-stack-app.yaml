apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-observability-prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    platform.banking.io/layer: observability
spec:
  project: banking-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "56.6.0"
      helm:
        valueFiles:
          - $values/environments/prod/prometheus-values.yaml
    - repoURL: https://github.com/LeDangQuocAn/banking-gitops.git
      targetRevision: production
      ref: values
    - repoURL: https://github.com/LeDangQuocAn/banking-gitops.git
      targetRevision: production
      path: environments/prod/dashboards
    - repoURL: https://github.com/LeDangQuocAn/banking-gitops.git
      targetRevision: production
      path: environments/prod/observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
