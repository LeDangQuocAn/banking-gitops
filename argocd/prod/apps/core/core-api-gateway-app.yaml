apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-prod-core-api-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    platform.banking.io/layer: core
spec:
  project: banking-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: banking-prod
  source:
    repoURL: https://github.com/LeDangQuocAn/banking-gitops.git
    targetRevision: production
    path: charts/banking-spring-boot
    helm:
      releaseName: gateway-prod
      valueFiles:
        - ../../environments/prod/common-values.yaml
        - ../../environments/prod/gateway-values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
